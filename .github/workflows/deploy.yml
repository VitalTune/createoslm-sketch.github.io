name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Detect build folder
        id: build-folder
        shell: bash
        run: |
          if [ -f ".output/public/index.html" ]; then
            echo "path=.output/public" >> "$GITHUB_OUTPUT"
            cp .output/public/index.html .output/public/404.html
          elif [ -f "dist/index.html" ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
            cp dist/index.html dist/404.html
          else
            echo "No static build output found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.build-folder.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
