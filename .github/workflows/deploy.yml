name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Find site folder
        id: site
        shell: bash
        run: |
          index_file=$(find . -path "./node_modules" -prune -o -name "index.html" -print | head -n 1)

          if [ -z "$index_file" ]; then
            echo "No index.html found after build"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          site_folder=$(dirname "$index_file")
          cp "$site_folder/index.html" "$site_folder/404.html"
          echo "path=$site_folder" >> "$GITHUB_OUTPUT"
          echo "Publishing $site_folder"

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
